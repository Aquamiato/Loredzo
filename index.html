      :root {
        color-scheme: dark;
        --font-luxury: 'Cinzel', serif;
        --font-modern: 'Space Grotesk', sans-serif;
        
        /* Oceanic Luxury Palette */
        --bg-deep: #030a10;            /* Deep Abyssal Navy */
        --accent-ocean: #7adcc4;        /* Luminous Seafoam Aqua */
        --text-pure: #ffffff;
        --text-dim: rgba(230, 240, 245, 0.75);
        --text-dark: rgba(180, 200, 210, 0.4);
        --border: rgba(122, 220, 196, 0.08); /* Aqua Tinted Border */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        background: var(--bg-deep);
        color: var(--text-dim);
        font-family: var(--font-modern);
        min-height: 100%;
        overflow-x: hidden;
        scroll-behavior: smooth;
      }

      /* Ambient Coastal Light Gradients */
      body::before {
        content: '';
        position: fixed;
        top: -10%;
        left: -10%;
        width: 120%;
        height: 120%;
        background: 
          radial-gradient(circle at 75% 15%, rgba(122, 220, 196, 0.06), transparent 45%),
          radial-gradient(circle at 20% 80%, rgba(3, 26, 46, 0.8), transparent 50%);
        z-index: -1;
        pointer-events: none;
      }

      a {
        color: inherit;
        text-decoration: none;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }

      /* --- Navigation --- */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.5rem 4rem;
        background: rgba(3, 10, 16, 0.8);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
      }

      .brand a {
        font-family: var(--font-luxury);
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: var(--text-pure);
        text-shadow: 0 0 15px rgba(122, 220, 196, 0.15);
      }

      .site-nav {
        display: flex;
        gap: 3rem;
      }

      .site-nav a {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--text-dark);
        font-weight: 500;
        position: relative;
      }

      .site-nav a::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        width: 0;
        height: 1px;
        background: var(--accent-ocean);
        transition: width 0.3s ease;
      }

      .site-nav a:hover {
        color: var(--text-pure);
      }
